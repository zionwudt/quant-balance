# QuantBalance 项目配置
# 复制此文件为 config.toml 并按需修改
# config.toml 已被 .gitignore 忽略，不会提交到仓库

[tushare]
# 获取方式：https://tushare.pro/register
token = "你的token"

[data]
# 日线数据源优先级；会按顺序自动回退
daily_providers = ["akshare", "baostock", "tushare"]

[server]
host = "127.0.0.1"
port = 8765
# API Key 认证（可选）；配置后所有 API 请求需携带 Authorization: Bearer <key>
# api_key = "your-secret-api-key"
# CORS 允许的源列表（默认 ["*"]）
# cors_origins = ["http://localhost:3000", "https://your-domain.com"]

[scheduler]
enabled = false
scan_time = "16:00"
strategies = ["macd", "rsi"]
symbols_source = "stock_pool"
asset_type = "stock"
top_n = 20
lookback_days = 365
cash = 100000

[notify]
enabled = []

[notify.wecom]
webhook = ""

[notify.dingtalk]
webhook = ""
secret = ""

[notify.serverchan]
sendkey = ""

[notify.email]
receiver = ""
smtp_host = ""
smtp_port = 465
sender = ""
password = ""
username = ""
use_ssl = true
starttls = true
