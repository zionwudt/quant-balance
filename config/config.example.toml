# QuantBalance 项目配置
# 复制此文件为 config.toml 并按需修改
# config.toml 已被 .gitignore 忽略，不会提交到仓库

[tushare]
# 获取方式：https://tushare.pro/register
token = "你的token"

[data]
# 日线数据源优先级；会按顺序自动回退
daily_providers = ["akshare", "baostock", "tushare"]

[server]
host = "127.0.0.1"
port = 8765

[scheduler]
enabled = false
scan_time = "16:00"
strategies = ["macd", "rsi"]
symbols_source = "stock_pool"
asset_type = "stock"
top_n = 20
lookback_days = 365
cash = 100000

[notifications]
wecom_webhook = ""
dingding_webhook = ""
serverchan_sendkey = ""
email_recipient = ""
smtp_host = ""
smtp_port = 465
smtp_username = ""
smtp_password = ""
smtp_sender = ""
smtp_use_ssl = true
